services:
  postgres:
    image: postgres:16-alpine
    container_name: clocked-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clocked
      POSTGRES_USER: clocked
      POSTGRES_PASSWORD: clocked
    ports:
      - "5433:5432"
    volumes:
      - clocked-postgres-data:/var/lib/postgresql/data

volumes:
  clocked-postgres-data:
